<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brand Deals — @yasmeenikole</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #0D0D0F; color: #F0EEE8; min-height: 100vh; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #1a1a1e; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
input, textarea, select, button { font-family: 'DM Sans', sans-serif; }
button { background: transparent; border: 1px solid #333; border-radius: 10px; padding: 9px 16px; color: #F0EEE8; cursor: pointer; font-size: 13px; transition: all 0.15s; }
button:hover:not(:disabled) { background: #1e1e24; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
input, select, textarea { background: #0D0D0F; border: 1px solid #2a2a30; border-radius: 10px; padding: 9px 13px; color: #F0EEE8; font-size: 13px; width: 100%; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #C9A84C; }
textarea { resize: vertical; }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.card { background: #17171C; border: 1px solid #222; border-radius: 16px; padding: 16px 20px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.pill { border: 1px solid #333; border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer; background: transparent; color: #999; transition: all 0.15s; }
.pill.active { background: #C9A84C; color: #0D0D0F; border-color: #C9A84C; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; overflow-y: auto; }
.modal { background: #17171C; border: 1px solid #2a2a30; border-radius: 20px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
.modal-wide { max-width: 680px; }
label.lbl { font-size: 11px; color: #888; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
.stat { background: #17171C; border-radius: 10px; padding: 10px 16px; border: 1px solid #222; min-width: 100px; }
.sync-ok  { background: #0a2a1a; color: #22C07A; border: 1px solid #1a4a2a; border-radius: 8px; padding: 5px 12px; font-size: 12px; }
.sync-err { background: #2a0a0a; color: #E84040; border: 1px solid #4a1a1a; border-radius: 8px; padding: 5px 12px; font-size: 12px; }
.tag-gmail { font-size: 10px; color: #555; border: 1px solid #2a2a30; border-radius: 4px; padding: 1px 5px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin 0.8s linear infinite; }
.tab { padding: 8px 18px; border-radius: 10px; font-size: 13px; cursor: pointer; border: none; background: transparent; color: #888; transition: all 0.15s; }
.tab.active { background: #1e1e24; color: #F0EEE8; }
.priority-high   { color: #E84040; }
.priority-medium { color: #F5A623; }
.priority-low    { color: #22C07A; }
.tag-chip { display: inline-block; background: #1e1e28; border: 1px solid #2a2a38; border-radius: 20px; padding: 2px 10px; font-size: 11px; color: #aaa; margin: 2px; }
.dash-card { background: #17171C; border: 1px solid #222; border-radius: 14px; padding: 20px; }
.followup-soon { color: #F5A623; font-size: 11px; }
.followup-overdue { color: #E84040; font-size: 11px; }
.email-box { background: #0D0D0F; border: 1px solid #2a2a30; border-radius: 12px; padding: 16px; font-size: 13px; line-height: 1.7; color: #ccc; white-space: pre-wrap; min-height: 200px; }
.copy-btn { background: #C9A84C; color: #0D0D0F; border-color: #C9A84C; font-weight: 600; }
.copy-btn:hover { background: #e8c87a !important; }
</style>
</head>
<body>
<div id="app" style="max-width:960px;margin:0 auto;padding:32px 24px 80px;"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQNvvfcTiTTrNSuCzZxmHvgbOZliXzi8Vvv9YCGgjXVGAgFU27Cgvn40spia45lvEUnOX5j0MoEmFeB/pub?gid=0&single=true&output=csv";
const ANTHROPIC_MODEL = "claude-sonnet-4-20250514";
const STATUSES   = ["Open Offer","Negotiating","Active","Completed","Declined"];
const PRIORITIES = ["High","Medium","Low"];
const CATEGORIES = ["Skincare","Fashion","Food & Drink","Fitness","Tech","Hair","Lifestyle","Travel","Other"];
const SC = {
  "Open Offer":  { bg:"#FFF4D6", text:"#A0660A", dot:"#F5A623" },
  "Negotiating": { bg:"#E8F0FF", text:"#2B4DB8", dot:"#378ADD" },
  "Active":      { bg:"#D6F5E8", text:"#0A6640", dot:"#1D9E75" },
  "Completed":   { bg:"#2a2a2a", text:"#888",    dot:"#888" },
  "Declined":    { bg:"#2a1010", text:"#E84040", dot:"#E84040" },
};

let state = {
  deals: tryLoad(),
  view: "deals", // deals | dashboard
  filter: "All", search: "",
  modal: null, form: emptyDeal(),
  syncing: false, syncMsg: "", syncOk: true,
  lastSync: localStorage.getItem("yk_last_sync") || "",
  confirmDelete: false,
  emailModal: null, // deal object
  emailLoading: false,
  emailText: "",
  emailTone: "professional",
  copiedEmail: false,
};

function tryLoad() { try { return JSON.parse(localStorage.getItem("yk_deals_v2")||"[]"); } catch { return []; } }
function trySave() { try { localStorage.setItem("yk_deals_v2", JSON.stringify(state.deals)); } catch {} }

function emptyDeal() {
  return {
    id: Date.now(), brand:"", contact:"", email:"", value:"",
    deliverables:"", deadline:"", status:"Open Offer", notes:"",
    priority:"Medium", category:"", followUpDate:"", tags:"",
  };
}

function fmt(v) { const n=parseFloat(String(v||"").replace(/[^0-9.]/g,"")); return isNaN(n)?v:"$"+n.toLocaleString(); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

function followUpStatus(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr); const now = new Date();
  const diff = Math.ceil((d - now) / 86400000);
  if (diff < 0) return `<span class="followup-overdue">⚠ Follow-up overdue</span>`;
  if (diff <= 3) return `<span class="followup-soon">⏰ Follow up in ${diff}d</span>`;
  return `<span style="font-size:11px;color:#555;">Follow up: ${dateStr}</span>`;
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  return lines.slice(1).map((line, i) => {
    const cols = []; let cur = "", inQ = false;
    for (let c of line) {
      if (c==='"') { inQ=!inQ; }
      else if (c===',' && !inQ) { cols.push(cur.trim()); cur=""; }
      else { cur+=c; }
    }
    cols.push(cur.trim());
    return {
      id: `sheet_${i}_${(cols[1]||"").replace(/\W/g,"_")}`,
      brand: cols[1]||"", contact: cols[2]||"", email: cols[3]||"",
      status: STATUSES.includes(cols[5])?cols[5]:"Open Offer",
      value: cols[6]||"", deadline: cols[7]||"", deliverables: cols[8]||"", notes: cols[9]||"",
      priority:"Medium", category:"", followUpDate:"", tags:"",
    };
  }).filter(d => d.brand);
}

async function doSync() {
  state.syncing=true; state.syncMsg=""; render();
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error("HTTP "+res.status);
    const text = await res.text();
    const incoming = parseCSV(text);
    if (incoming.length===0) { state.syncMsg="No rows found."; state.syncOk=true; }
    else {
      const manual = state.deals.filter(d=>!String(d.id).startsWith("sheet_"));
      const manualBrands = new Set(manual.map(d=>d.brand.toLowerCase()));
      const existIds = new Set(state.deals.filter(d=>String(d.id).startsWith("sheet_")).map(d=>d.id));
      const fresh = incoming.filter(d=>!manualBrands.has(d.brand.toLowerCase())&&!existIds.has(d.id));
      const updated = state.deals.filter(d=>String(d.id).startsWith("sheet_")).map(ex=>{
        const m=incoming.find(i=>i.id===ex.id);
        return m?{...m, priority:ex.priority, category:ex.category, followUpDate:ex.followUpDate, tags:ex.tags, notes:ex.notes||m.notes}:ex;
      });
      state.deals=[...fresh,...updated,...manual];
      trySave();
      const now=new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
      state.lastSync=now; localStorage.setItem("yk_last_sync",now);
      state.syncMsg=`Synced ${incoming.length} deal${incoming.length!==1?"s":""}`;
      state.syncOk=true;
    }
  } catch(e) { state.syncMsg="Sync failed: "+e.message; state.syncOk=false; }
  state.syncing=false; render();
  setTimeout(()=>{ state.syncMsg=""; render(); }, 4000);
}

async function generateEmail() {
  const d = state.emailModal;
  state.emailLoading=true; state.emailText=""; render();
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 1000,
        messages:[{
          role:"user",
          content:`You are a social media manager for @yasmeenikole, a TikTok creator. Write a ${state.emailTone} email reply to a brand deal offer with these details:

Brand: ${d.brand}
Contact: ${d.contact||"the brand team"}
Deal Value: ${d.value||"not specified"}
Deliverables: ${d.deliverables||"not specified"}
Deadline: ${d.deadline||"not specified"}
Status: ${d.status}
Notes: ${d.notes||"none"}

Write a reply email that is warm, confident, and professional. If status is "Open Offer" or "Negotiating", express interest and ask any clarifying questions needed. If "Declined", politely decline. Keep it concise — under 150 words. Output ONLY the email body text, no subject line, no quotes around it.`
        }]
      })
    });
    const data = await res.json();
    state.emailText = data.content?.[0]?.text || "Could not generate email.";
  } catch(e) {
    state.emailText = "Error generating email: "+e.message;
  }
  state.emailLoading=false; render();
}

function copyEmail() {
  navigator.clipboard.writeText(state.emailText).then(()=>{
    state.copiedEmail=true; render();
    setTimeout(()=>{ state.copiedEmail=false; render(); }, 2000);
  });
}

function exportPDF() {
  const win=window.open("","_blank");
  const rows=state.deals.map(d=>`<tr>
    <td>${esc(d.brand)||"—"}</td>
    <td>${esc(d.contact)||"—"}</td>
    <td>${d.value?fmt(d.value):"—"}</td>
    <td>${esc(d.deadline)||"—"}</td>
    <td>${esc(d.deliverables)||"—"}</td>
    <td>${d.status}</td>
    <td>${d.priority||"—"}</td>
    <td>${d.category||"—"}</td>
    <td>${esc(d.notes)||"—"}</td>
  </tr>`).join("");
  win.document.write(`<!DOCTYPE html><html><head><title>Brand Deals</title><style>
    body{font-family:Georgia,serif;padding:40px;color:#1a1a1a}h1{margin-bottom:4px}
    .sub{color:#888;font-size:13px;margin-bottom:24px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{background:#1a1a1a;color:#fff;padding:8px 10px;text-align:left}
    td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:top}
    tr:nth-child(even)td{background:#fafafa}
  </style></head><body>
  <h1>Brand Deals</h1>
  <div class="sub">@yasmeenikole · Exported ${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
  <table><thead><tr><th>Brand</th><th>Contact</th><th>Value</th><th>Deadline</th><th>Deliverables</th><th>Status</th><th>Priority</th><th>Category</th><th>Notes</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <script>window.onload=()=>window.print()<\/script></body></html>`);
  win.document.close();
}

function renderDashboard() {
  const deals = state.deals;
  const totalValue = deals.filter(d=>d.value).reduce((a,d)=>a+parseFloat(String(d.value).replace(/[^0-9.]/g,"")||0),0);
  const activeValue = deals.filter(d=>d.status==="Active"&&d.value).reduce((a,d)=>a+parseFloat(String(d.value).replace(/[^0-9.]/g,"")||0),0);
  const completedValue = deals.filter(d=>d.status==="Completed"&&d.value).reduce((a,d)=>a+parseFloat(String(d.value).replace(/[^0-9.]/g,"")||0),0);
  const openCount = deals.filter(d=>d.status==="Open Offer"||d.status==="Negotiating").length;
  const catCounts = {};
  deals.forEach(d=>{ if(d.category){ catCounts[d.category]=(catCounts[d.category]||0)+1; }});
  const topCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const upcoming = deals.filter(d=>d.followUpDate&&new Date(d.followUpDate)>=new Date()).sort((a,b)=>new Date(a.followUpDate)-new Date(b.followUpDate)).slice(0,5);
  const overdue = deals.filter(d=>d.followUpDate&&new Date(d.followUpDate)<new Date());

  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;">
      <div class="dash-card">
        <div style="font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Total Pipeline</div>
        <div style="font-size:26px;font-weight:600;color:#C9A84C;">$${totalValue.toLocaleString()}</div>
        <div style="font-size:11px;color:#555;margin-top:4px;">${deals.length} deals total</div>
      </div>
      <div class="dash-card">
        <div style="font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Active</div>
        <div style="font-size:26px;font-weight:600;color:#22C07A;">$${activeValue.toLocaleString()}</div>
        <div style="font-size:11px;color:#555;margin-top:4px;">${deals.filter(d=>d.status==="Active").length} deals</div>
      </div>
      <div class="dash-card">
        <div style="font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Completed</div>
        <div style="font-size:26px;font-weight:600;color:#5272E8;">$${completedValue.toLocaleString()}</div>
        <div style="font-size:11px;color:#555;margin-top:4px;">${deals.filter(d=>d.status==="Completed").length} deals</div>
      </div>
      <div class="dash-card">
        <div style="font-size:11px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Open Offers</div>
        <div style="font-size:26px;font-weight:600;color:#F5A623;">${openCount}</div>
        <div style="font-size:11px;color:#555;margin-top:4px;">need response</div>
      </div>
      ${overdue.length>0?`
      <div class="dash-card" style="border-color:#E8404044;">
        <div style="font-size:11px;color:#E84040;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Overdue Follow-ups</div>
        <div style="font-size:26px;font-weight:600;color:#E84040;">${overdue.length}</div>
        <div style="font-size:11px;color:#555;margin-top:4px;">need attention</div>
      </div>`:""}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="dash-card">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px;">Status breakdown</div>
        ${STATUSES.map(s=>{
          const count = deals.filter(d=>d.status===s).length;
          const pct = deals.length ? Math.round(count/deals.length*100) : 0;
          return `<div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="font-size:12px;color:#aaa;">${s}</span>
              <span style="font-size:12px;color:#666;">${count}</span>
            </div>
            <div style="background:#222;border-radius:4px;height:4px;">
              <div style="background:${SC[s].dot};border-radius:4px;height:4px;width:${pct}%;transition:width 0.3s;"></div>
            </div>
          </div>`;
        }).join("")}
      </div>

      <div class="dash-card">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px;">Upcoming follow-ups</div>
        ${upcoming.length===0
          ?`<div style="color:#555;font-size:13px;">No upcoming follow-ups</div>`
          :upcoming.map(d=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #222;">
              <div>
                <div style="font-size:13px;font-weight:500;">${esc(d.brand)}</div>
                <div style="font-size:11px;color:#888;">${d.followUpDate}</div>
              </div>
              <span class="badge" style="background:${SC[d.status]?.bg};color:${SC[d.status]?.text};">${d.status}</span>
            </div>`).join("")}
      </div>

      ${topCats.length>0?`
      <div class="dash-card">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px;">Top categories</div>
        ${topCats.map(([cat,count])=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;">
            <span style="font-size:13px;color:#aaa;">${cat}</span>
            <span style="font-size:13px;font-weight:500;">${count} deal${count!==1?"s":""}</span>
          </div>`).join("")}
      </div>`:""}

      <div class="dash-card">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px;">Priority breakdown</div>
        ${PRIORITIES.map(p=>{
          const count=deals.filter(d=>d.priority===p).length;
          const colors={"High":"#E84040","Medium":"#F5A623","Low":"#22C07A"};
          return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222;">
            <span style="font-size:13px;color:${colors[p]};">● ${p}</span>
            <span style="font-size:13px;">${count} deal${count!==1?"s":""}</span>
          </div>`;
        }).join("")}
      </div>
    </div>
  `;
}

function render() {
  const { deals, view, filter, search, modal, form, syncing, syncMsg, syncOk, lastSync, confirmDelete, emailModal, emailLoading, emailText, emailTone, copiedEmail } = state;

  const filtered = deals.filter(d => {
    const mf = filter==="All"||d.status===filter;
    const ms = !search||d.brand.toLowerCase().includes(search.toLowerCase())||d.contact.toLowerCase().includes(search.toLowerCase())||(d.category||"").toLowerCase().includes(search.toLowerCase());
    return mf&&ms;
  });
  const counts = STATUSES.reduce((a,s)=>{ a[s]=deals.filter(d=>d.status===s).length; return a; },{});

  document.getElementById("app").innerHTML = `
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:24px;">
      <div>
        <div style="font-size:11px;letter-spacing:3px;color:#C9A84C;text-transform:uppercase;margin-bottom:6px;">@yasmeenikole</div>
        <div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1.1;">Brand Deals</div>
        ${lastSync?`<div style="font-size:11px;color:#555;margin-top:5px;">Last synced: ${lastSync}</div>`:""}
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:4px;">
        ${syncMsg?`<span class="${syncOk?"sync-ok":"sync-err"}">${syncMsg}</span>`:""}
        <button onclick="doSync()" ${syncing?"disabled":""} style="color:#22C07A;border-color:#22C07A55;">
          <span class="${syncing?"spin":""}">↻</span> ${syncing?"Syncing…":"Sync Sheet"}
        </button>
        <button onclick="exportPDF()" style="color:#C9A84C;border-color:#C9A84C55;">↓ PDF</button>
        <button onclick="openNew()" style="background:#C9A84C;color:#0D0D0F;border-color:#C9A84C;font-weight:600;">+ New Deal</button>
      </div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:4px;margin-bottom:24px;background:#17171C;border-radius:12px;padding:4px;width:fit-content;">
      <button class="tab ${view==="deals"?"active":""}" onclick="state.view='deals';render()">Deals</button>
      <button class="tab ${view==="dashboard"?"active":""}" onclick="state.view='dashboard';render()">Dashboard</button>
    </div>

    ${view==="dashboard" ? renderDashboard() : `
    <!-- Stats -->
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
      ${STATUSES.map(s=>`
        <div class="stat">
          <div style="font-size:22px;font-weight:600;color:${SC[s].dot}">${counts[s]||0}</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">${s}</div>
        </div>`).join("")}
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:20px;">
      ${["All",...STATUSES].map(f=>`<button class="pill ${filter===f?"active":""}" onclick="setFilter('${f}')">${f}</button>`).join("")}
      <input placeholder="Search brand, contact, category…" value="${esc(search)}" oninput="setSearch(this.value)" style="margin-left:auto;width:220px;"/>
    </div>

    <!-- Deal cards -->
    <div style="display:flex;flex-direction:column;gap:12px;">
      ${filtered.length===0
        ?`<div style="text-align:center;color:#555;padding:60px 0;font-size:15px;">${deals.length===0?"No deals yet — click Sync Sheet or add one manually.":"No deals match your filter."}</div>`
        :filtered.map(d=>{
          const sc=SC[d.status]||SC["Open Offer"];
          const fromSheet=String(d.id).startsWith("sheet_");
          const pColors={"High":"#E84040","Medium":"#F5A623","Low":"#22C07A"};
          return `<div class="card" onclick="openEdit('${d.id}')">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
              <span style="font-size:16px;font-weight:600;">${esc(d.brand)||"Unnamed Brand"}</span>
              <span class="badge" style="background:${sc.bg};color:${sc.text};">
                <span style="width:6px;height:6px;border-radius:50%;background:${sc.dot};display:inline-block;flex-shrink:0;"></span>
                ${d.status}
              </span>
              ${d.priority?`<span style="font-size:11px;color:${pColors[d.priority]||"#888"};">● ${d.priority}</span>`:""}
              ${d.category?`<span class="tag-chip">${esc(d.category)}</span>`:""}
              ${fromSheet?`<span class="tag-gmail">from Gmail</span>`:""}
              <button onclick="event.stopPropagation();openEmailModal('${d.id}')" style="margin-left:auto;font-size:11px;padding:4px 10px;border-radius:8px;color:#C9A84C;border-color:#C9A84C44;">✉ Draft Reply</button>
            </div>
            <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:${d.followUpDate?"8px":"0"};">
              ${d.contact?`<span style="font-size:13px;color:#888;">👤 ${esc(d.contact)}</span>`:""}
              ${d.value?`<span style="font-size:13px;font-weight:600;color:#C9A84C;">${fmt(d.value)}</span>`:""}
              ${d.deadline?`<span style="font-size:13px;color:#888;">📅 ${esc(d.deadline)}</span>`:""}
              ${d.deliverables?`<span style="font-size:13px;color:#666;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">📋 ${esc(d.deliverables)}</span>`:""}
            </div>
            ${d.followUpDate?`<div>${followUpStatus(d.followUpDate)}</div>`:""}
          </div>`;
        }).join("")}
    </div>
    `}

    <!-- Deal modal -->
    ${modal?`
    <div class="overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">
          <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;">${modal==="new"?"New Deal":"Edit Deal"}</div>
          <button onclick="closeModal()" style="font-size:20px;padding:0 8px;border:none;color:#888;">✕</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div><label class="lbl">Brand name *</label><input value="${esc(form.brand)}" oninput="sf('brand',this.value)" placeholder="e.g. Glossier"/></div>
          <div class="grid2">
            <div><label class="lbl">Contact name</label><input value="${esc(form.contact)}" oninput="sf('contact',this.value)" placeholder="e.g. Sarah K."/></div>
            <div><label class="lbl">Email</label><input value="${esc(form.email)}" oninput="sf('email',this.value)" placeholder="sarah@brand.com"/></div>
          </div>
          <div class="grid2">
            <div><label class="lbl">Deal value</label><input value="${esc(form.value)}" oninput="sf('value',this.value)" placeholder="e.g. $2,500"/></div>
            <div><label class="lbl">Deadline</label><input type="date" value="${esc(form.deadline)}" oninput="sf('deadline',this.value)"/></div>
          </div>
          <div class="grid2">
            <div><label class="lbl">Priority</label>
              <select onchange="sf('priority',this.value)">
                ${PRIORITIES.map(p=>`<option value="${p}" ${form.priority===p?"selected":""}>${p}</option>`).join("")}
              </select>
            </div>
            <div><label class="lbl">Category</label>
              <select onchange="sf('category',this.value)">
                <option value="">Select…</option>
                ${CATEGORIES.map(c=>`<option value="${c}" ${form.category===c?"selected":""}>${c}</option>`).join("")}
              </select>
            </div>
          </div>
          <div><label class="lbl">Follow-up date</label><input type="date" value="${esc(form.followUpDate)}" oninput="sf('followUpDate',this.value)"/></div>
          <div><label class="lbl">Deliverables</label><textarea oninput="sf('deliverables',this.value)" placeholder="e.g. 1 TikTok, 3 stories">${esc(form.deliverables)}</textarea></div>
          <div><label class="lbl">Status</label>
            <select onchange="sf('status',this.value)">
              ${STATUSES.map(s=>`<option value="${s}" ${form.status===s?"selected":""}>${s}</option>`).join("")}
            </select>
          </div>
          <div><label class="lbl">Notes</label><textarea oninput="sf('notes',this.value)" placeholder="Any extra details…" style="min-height:70px;">${esc(form.notes)}</textarea></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:22px;">
          <div>
            ${modal!=="new"?(confirmDelete
              ?`<span style="font-size:12px;color:#888;margin-right:8px;">Sure?</span>
                <button onclick="doDelete()" style="font-size:12px;color:#E84040;border-color:#E84040;">Yes, delete</button>
                <button onclick="state.confirmDelete=false;render()" style="font-size:12px;margin-left:6px;">Cancel</button>`
              :`<button onclick="state.confirmDelete=true;render()" style="font-size:12px;color:#E84040;border-color:#E8404033;">Delete</button>`)
            :""}
          </div>
          <div style="display:flex;gap:10px;">
            <button onclick="closeModal()" style="font-size:13px;">Cancel</button>
            <button onclick="saveDeal()" style="background:#C9A84C;color:#0D0D0F;border-color:#C9A84C;font-weight:600;font-size:13px;">${modal==="new"?"Add Deal":"Save Changes"}</button>
          </div>
        </div>
      </div>
    </div>`:""}

    <!-- Email modal -->
    ${emailModal?`
    <div class="overlay" onclick="closeEmailModal()">
      <div class="modal modal-wide" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;">Draft Reply</div>
            <div style="font-size:12px;color:#888;margin-top:3px;">${esc(emailModal.brand)}</div>
          </div>
          <button onclick="closeEmailModal()" style="font-size:20px;padding:0 8px;border:none;color:#888;">✕</button>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;">
          <label class="lbl" style="margin:0;white-space:nowrap;">Tone:</label>
          ${["professional","friendly","firm","enthusiastic"].map(t=>`
            <button class="pill ${emailTone===t?"active":""}" onclick="state.emailTone='${t}';render();">${t}</button>`).join("")}
          <button onclick="generateEmail()" ${emailLoading?"disabled":""} style="margin-left:auto;background:#C9A84C;color:#0D0D0F;border-color:#C9A84C;font-weight:600;">
            ${emailLoading?"Generating…":"✨ Generate"}
          </button>
        </div>

        ${emailText?`
        <div class="email-box">${esc(emailText)}</div>
        <div style="display:flex;gap:10px;margin-top:14px;justify-content:flex-end;">
          <button onclick="state.emailTone=state.emailTone;generateEmail()" style="font-size:13px;">↺ Regenerate</button>
          <button class="copy-btn" onclick="copyEmail()" style="font-size:13px;">${copiedEmail?"✓ Copied!":"Copy to clipboard"}</button>
        </div>`
        :`<div style="text-align:center;color:#555;padding:40px 0;font-size:14px;">Hit Generate to draft your reply using AI</div>`}
      </div>
    </div>`:""}
  `;
}

function setFilter(f){state.filter=f;render();}
function setSearch(v){state.search=v;render();}
function sf(k,v){state.form[k]=v;}
function openNew(){state.form=emptyDeal();state.modal="new";state.confirmDelete=false;render();}
function openEdit(id){const d=state.deals.find(x=>String(x.id)===String(id));if(d){state.form={...d};state.modal=d;state.confirmDelete=false;render();}}
function closeModal(){state.modal=null;state.confirmDelete=false;render();}
function doDelete(){state.deals=state.deals.filter(d=>String(d.id)!==String(state.form.id));trySave();closeModal();}
function saveDeal(){
  if(!state.form.brand.trim())return;
  if(state.modal==="new"){state.deals=[{...state.form,id:Date.now()},...state.deals];}
  else{state.deals=state.deals.map(d=>String(d.id)===String(state.form.id)?{...state.form}:d);}
  trySave();closeModal();
}
function openEmailModal(id){
  const d=state.deals.find(x=>String(x.id)===String(id));
  if(d){state.emailModal=d;state.emailText="";state.copiedEmail=false;render();}
}
function closeEmailModal(){state.emailModal=null;state.emailText="";render();}

render();
</script>
</body>
</html>
